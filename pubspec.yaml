name: strengthlabs
description: "StrengthLabs — fitness training tracking app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^9.1.1
  go_router: ^17.2.3
  equatable: ^2.0.5
  dio: ^5.4.0
  flutter_secure_storage: ^10.0.0
  intl: ^0.20.2
  path_provider: ^2.1.2
  excel: ^4.0.6
  share_plus: ^12.0.2
  google_sign_in: ^6.2.1
  shared_preferences: ^2.3.0
  shimmer: ^3.0.0
  uuid: ^4.5.1
  connectivity_plus: ^7.0.0
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  build_runner: ^2.4.13
  drift_dev: ^2.20.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#6366F1"
  adaptive_icon_foreground: "assets/icon/icon.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter_native_splash:
  color: "#0F0F18"
  color_dark: "#0F0F18"
  image: assets/icon/icon.png
  android_12:
    color: "#0F0F18"
    icon_background_color: "#6366F1"
    image: assets/icon/icon.png

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icon/
